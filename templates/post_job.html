{% extends 'base.html' %}
{% block title %}Post a Job – NMIT{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:680px;">
  <div class="nmit-card p-4 p-md-5">
    <h4 class="text-navy mb-1"><i class="bi bi-plus-circle me-2 text-gold"></i>Post a Job / Internship</h4>
    <p class="text-muted small mb-4">Help students by sharing opportunities from your workplace.</p>

    <form method="POST" action="{{ url_for('post_job') }}">
      <div class="row g-3">

        <div class="col-12">
          <label class="form-label">Job Title <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control" placeholder="e.g. Software Engineering Intern" required/>
        </div>

        <div class="col-sm-6">
          <label class="form-label">Company <span class="text-danger">*</span></label>
          <input type="text" name="company" class="form-control" placeholder="Your company" required/>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Location</label>
          <input type="text" name="location" class="form-control" placeholder="e.g. Bangalore / Remote"/>
        </div>

        <div class="col-sm-6">
          <label class="form-label">Job Type</label>
          <select name="job_type" class="form-select">
            <option value="Full-time">Full-time</option>
            <option value="Internship">Internship</option>
            <option value="Part-time">Part-time</option>
          </select>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Apply Link / URL</label>
          <input type="url" name="apply_link" class="form-control" placeholder="https://careers.company.com"/>
        </div>

        <div class="col-12">
          <label class="form-label">Job Description <span class="text-danger">*</span></label>
          <textarea name="description" class="form-control" rows="5"
            placeholder="Describe the role, responsibilities, requirements…" required></textarea>
        </div>

        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-nmit px-4">Post Job</button>
          <a href="{{ url_for('jobs') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
